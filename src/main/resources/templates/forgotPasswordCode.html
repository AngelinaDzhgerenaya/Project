<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение кода</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="container-login">

    <h1>Введите код из письма</h1>

    <!-- ===== ошибка если есть ===== -->
    <div th:if="${errorMessage != null}" class="error-message">
        <span th:text="${errorMessage}"></span>
    </div>

    <form method="post" action="/not-secured/v1/login/verify">

        <!-- email скрыто -->
        <input type="hidden" name="email" th:value="${email}">

        <!-- код -->
        <input name="code"
               placeholder="Код из письма"
               required>

        <button type="submit" class="btn">
            Подтвердить
        </button>

    </form>

    <p>
        <a href="/not-secured/login">← Назад ко входу</a>
    </p>

</div>

</body>
</html>
